services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: callvoice
      POSTGRES_PASSWORD: callvoice
      POSTGRES_DB: callvoice
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callvoice"]
      interval: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  freeswitch:
    build: ./deploy/freeswitch
    # ESL is internal to the Compose network (edge → freeswitch:8021).
    # Do not publish 8021 on the host by default (conflicts on some macOS setups).
    # For host access or WSS lab ports, use docker-compose.override.yml (gitignored).
    # Debug: docker compose exec freeswitch fs_cli
    volumes:
      - fs_gateways:/etc/freeswitch/gateways
      - fs_directory:/etc/freeswitch/directory/default
      # Image entrypoint recopies vanilla conf; bind-mount CallVoice lab configs.
      - ./deploy/freeswitch/conf/autoload_configs/event_socket.conf.xml:/etc/freeswitch/autoload_configs/event_socket.conf.xml:ro
      - ./deploy/freeswitch/conf/autoload_configs/acl.conf.xml:/etc/freeswitch/autoload_configs/acl.conf.xml:ro
      - ./deploy/freeswitch/conf/sip_profiles/external.xml:/etc/freeswitch/sip_profiles/external.xml:ro
      - ./deploy/freeswitch/conf/sip_profiles/internal.xml:/etc/freeswitch/sip_profiles/internal.xml:ro
      - ./deploy/freeswitch/conf/dialplan/public/00_callvoice_inbound.xml:/etc/freeswitch/dialplan/public/00_callvoice_inbound.xml:ro
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports: ["8080:8080"]
    environment:
      DATABASE_URL: postgres://callvoice:callvoice@postgres:5432/callvoice?sslmode=disable
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: dev-session-secret-change-me-32b
      CARRIER_SECRET_KEY: 0123456789abcdef0123456789abcdef
      COOKIE_SECURE: "false"
      CORS_ORIGINS: http://localhost:3000
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  edge:
    build:
      context: .
      dockerfile: services/edge/Dockerfile
    ports: ["8081:8081"]
    environment:
      DATABASE_URL: postgres://callvoice:callvoice@postgres:5432/callvoice?sslmode=disable
      REDIS_URL: redis://redis:6379
      CARRIER_SECRET_KEY: 0123456789abcdef0123456789abcdef
      FREESWITCH_ESL_ADDR: freeswitch:8021
      FREESWITCH_ESL_PASSWORD: ClueCon
      FREESWITCH_GATEWAY_DIR: /etc/freeswitch/gateways
      FREESWITCH_DIRECTORY_DIR: /etc/freeswitch/directory/default
      FREESWITCH_WSS_URL: wss://localhost:7443
      FREESWITCH_SIP_DOMAIN: localhost
      CORS_ORIGINS: http://localhost:3000
      API_BASE_URL: http://api:8080
    volumes:
      - fs_gateways:/etc/freeswitch/gateways
      - fs_directory:/etc/freeswitch/directory/default
    depends_on: [redis, freeswitch, api, postgres]
  web:
    build: ./apps/web
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_EDGE_URL: http://localhost:8081
    depends_on: [api, edge]

volumes:
  fs_gateways:
  fs_directory:
